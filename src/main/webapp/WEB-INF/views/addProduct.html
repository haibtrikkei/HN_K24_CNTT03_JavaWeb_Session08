<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm mới sản phẩm</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <h1>THÊM MỚI SẢN PHẨM</h1>
        <form th:action="@{/products/add}" method="post" th:object="${product}">
             <div class="form-group">
                 <label for="proId">Mã sản phẩm</label>
                 <input type="text" class="form-control" id="proId" th:field="*{proId}">
                 <small class="text-danger" th:if="${#fields.hasErrors('proId')}" th:errors="*{proId}"></small>
             </div>
            <div class="form-group">
                <label for="proName">Tên sản phẩm</label>
                <input type="text" class="form-control" id="proName" th:field="*{proName}">
                <small class="text-danger" th:if="${#fields.hasErrors('proName')}" th:errors="*{proName}"></small>
            </div>
            <div class="form-group">
                <label for="producer">Nhà sản xuất</label>
                <input type="text" class="form-control" id="producer" th:field="*{producer}">
                <small class="text-danger" th:if="${#fields.hasErrors('producer')}" th:errors="*{producer}"></small>
            </div>
            <div class="form-group">
                <label for="yearMaking">Năm sản xuất</label>
                <input type="number" class="form-control" id="yearMaking" th:field="*{yearMaking}">
                <small class="text-danger" th:if="${#fields.hasErrors('yearMaking')}" th:errors="*{yearMaking}"></small>
            </div>
            <div class="form-group">
                <label for="quantity">Số lượng</label>
                <input type="number" class="form-control" id="quantity" th:field="*{quantity}">
                <small class="text-danger" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></small>
            </div>
            <div class="form-group">
                <label for="expireDate">Ngày hết hạn</label>
                <input type="date" class="form-control" id="expireDate" th:field="*{expireDate}">
                <small class="text-danger" th:if="${#fields.hasErrors('expireDate')}" th:errors="*{expireDate}"></small>
            </div>
            <div class="form-group">
                <label for="price">Giá bán</label>
                <input type="number" class="form-control" id="price" th:field="*{price}">
                <small class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></small>
            </div>
            <div class="form-group">
                <input type="submit" class="btn btn-primary" value="Thêm mới">
                <input type="reset" class="btn btn-secondary" value="Làm lại">
            </div>
        </form>
    </div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
